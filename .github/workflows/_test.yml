name: _test

on:
  workflow_dispatch:
  workflow_call:

jobs:
  test:
    name: CLI smoke (WASM generate)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'latest'
          cache: 'npm'

      - name: Restore node_modules cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Restore vendored wheels cache
        id: cache-wheels
        uses: actions/cache@v5
        with:
          path: vendor
          key: ${{ runner.os }}-wheels-${{ hashFiles('scripts/vendor-wheels.mjs') }}

      - name: Vendor runtime wheels
        if: steps.cache-wheels.outputs.cache-hit != 'true'
        run: npm run vendor

      - name: Build CLI
        run: npm run build

      - name: Run CLI smoke test
        run: npm run test:cli
