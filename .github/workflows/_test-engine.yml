name: _test-engine

on:
  workflow_dispatch:
  workflow_call:

jobs:
  test-engine:
    name: Python engine (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: python
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: python/pyproject.toml

      - name: Install engine (with dev extras)
        run: pip install -e ".[dev]"

      - name: Run pytest
        run: python -m pytest
