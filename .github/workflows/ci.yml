name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches-ignore:
      - main

jobs:
  install:
    name: Install Dependencies
    uses: ./.github/workflows/_install.yml

  build:
    name: Build CLI
    needs: install
    uses: ./.github/workflows/_build.yml

  test:
    name: CLI Smoke Test
    needs: install
    uses: ./.github/workflows/_test.yml

  test-engine:
    name: Python Engine Tests
    uses: ./.github/workflows/_test-engine.yml
